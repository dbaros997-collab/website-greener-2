# Render Blueprint — https://render.com/docs/blueprint-spec
# Sync this file from the Render Dashboard (Blueprints) or apply on first deploy.
databases:
  - name: grace-db
    plan: free
    databaseName: grace_high_school
    user: grace

services:
  - type: web
    name: website-greener-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm run build
    # Schema setup is best-effort; the API always starts and listens afterward.
    startCommand: node ./scripts/src/setup-db.mjs; node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: grace-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: PASSWORD_RESET_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

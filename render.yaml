# Render Blueprint — https://render.com/docs/blueprint-spec
# Sync this file from the Render Dashboard (Blueprints) or apply on first deploy.
databases:
  - name: grace-db
    plan: free
    databaseName: grace_high_school
    user: grace

services:
  - type: web
    name: website-greener-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm run build
    # Start the API only — schema setup runs inside the process after listen.
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: grace-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: PASSWORD_RESET_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

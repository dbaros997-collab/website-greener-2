# Keep the free Render web service awake.
# Free instances spin down after ~15 minutes without traffic; pinging
# /api/healthz every 10 minutes resets that idle timer.
#
# Note: continuous uptime uses Free instance hours (~750/month). One always-on
# free web service fits within that budget for a typical month.

name: Keep Render awake

on:
  schedule:
    # Every 10 minutes (UTC). GitHub may delay scheduled jobs slightly.
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: keep-render-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        env:
          # Optional override: repo Settings → Secrets and variables → Variables
          # → RENDER_KEEPALIVE_URL
          SITE_URL: ${{ vars.RENDER_KEEPALIVE_URL }}
        run: |
          set -euo pipefail
          base="${SITE_URL:-https://grace-high-school-gayaza-t7p6.onrender.com}"
          url="${base%/}/api/healthz"
          echo "Pinging $url"
          # Retry a few times in case of a cold start.
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 90 "$url"; then
              echo
              echo "OK (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed; retrying in 15s..."
            sleep 15
          done
          echo "Keep-alive ping failed after retries"
          exit 1

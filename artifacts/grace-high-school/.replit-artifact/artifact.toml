kind = "web"
previewPath = "/"
title = "Grace High School"
version = "1.0.0"
id = "artifacts/grace-high-school"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24144

[services.development]
run = "pnpm --filter @workspace/grace-high-school run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grace-high-school", "run", "build" ]
publicDir = "artifacts/grace-high-school/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24144"
BASE_PATH = "/"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    Resource:
      type: object
      required: [id, title, subject, category, level, objectPath, fileName, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        subject:
          type: string
        category:
          type: string
          description: past_paper or holiday_work.
        level:
          type: string
          description: 'O-Level, A-Level, or All.'
        term:
          type: string
          nullable: true
        objectPath:
          type: string
        fileName:
          type: string
        fileSize:
          type: integer
          nullable: true
        contentType:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    ResourceList:
      type: array
      items:
        $ref: '#/components/schemas/Resource'
    CreateResourceInput:
      type: object
      required: [title, subject, category, objectPath, fileName]
      properties:
        title:
          type: string
          minLength: 1
        subject:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
          description: past_paper or holiday_work.
        level:
          type: string
          description: 'O-Level, A-Level, or All. Defaults to All.'
        term:
          type: string
          nullable: true
        objectPath:
          type: string
          minLength: 1
        fileName:
          type: string
          minLength: 1
        fileSize:
          type: integer
          nullable: true
        contentType:
          type: string
          nullable: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    Submission:
      type: object
      required: [id, type, firstName, status, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [enquiry, application]
          description: enquiry or application.
        firstName:
          type: string
        lastName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        level:
          type: string
          nullable: true
          description: Class the applicant is applying for (e.g. S1).
        message:
          type: string
          nullable: true
        fileUrl:
          type: string
          nullable: true
          description: Object path of the applicant's uploaded completed form, if any.
        fileName:
          type: string
          nullable: true
          description: Original file name of the uploaded completed form.
        status:
          type: string
          enum: [new, read]
          description: new or read.
        createdAt:
          type: string
          format: date-time
    SubmissionList:
      type: array
      items:
        $ref: '#/components/schemas/Submission'
    CreateSubmissionInput:
      type: object
      required: [firstName]
      properties:
        type:
          type: string
          enum: [enquiry, application]
          description: enquiry or application. Defaults to enquiry.
        firstName:
          type: string
          minLength: 1
          maxLength: 120
        lastName:
          type: string
          nullable: true
          maxLength: 120
        email:
          type: string
          nullable: true
          maxLength: 200
        phone:
          type: string
          nullable: true
          maxLength: 40
        level:
          type: string
          nullable: true
          maxLength: 40
        message:
          type: string
          nullable: true
          maxLength: 2000
        fileUrl:
          type: string
          nullable: true
          maxLength: 500
          description: Object path returned by the application-form upload flow.
        fileName:
          type: string
          nullable: true
          maxLength: 260
          description: Original file name of the uploaded completed form.
    UpdateSubmissionInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [new, read]
          description: new or read.
    NewsItem:
      type: object
      required: [id, message, isVisible, sortOrder, createdAt]
      properties:
